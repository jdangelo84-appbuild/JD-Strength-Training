<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Justin's Training Program</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #2C2C2A; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding: 0 0 2rem; }
.header { background: #2C2C2A; color: white; padding: 1.25rem 1rem 1rem; text-align: center; }
.header h1 { font-size: 20px; font-weight: 600; }
.header p { font-size: 12px; opacity: 0.7; margin-top: 3px; }
.phase-badge { display: inline-block; background: rgba(255,255,255,0.15); color: white; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px; }
.tabs-wrap { background: white; border-bottom: 1px solid #e0e0dc; padding: 10px 12px 0; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.week-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
.week-tabs::-webkit-scrollbar { display: none; }
.week-tab { flex-shrink: 0; padding: 5px 12px; border-radius: 20px; border: 1.5px solid #D3D1C7; background: white; color: #888780; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; }
.week-tab.active { background: #2C2C2A; color: white; border-color: #2C2C2A; }
.day-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px 12px; background: white; border-bottom: 1px solid #e0e0dc; }
.day-tab { padding: 7px 2px; border-radius: 8px; border: 1px solid #D3D1C7; background: white; color: #888780; font-size: 11px; font-weight: 500; cursor: pointer; text-align: center; }
.day-tab.active { background: #f0ede8; color: #2C2C2A; border-color: #2C2C2A; font-weight: 600; }
.day-tab.bonus { border-style: dashed; }
.progress-wrap { padding: 10px 14px 0; }
.progress-text { font-size: 12px; color: #888780; margin-bottom: 5px; }
.progress-bar { height: 5px; background: #e0e0dc; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: #854F0B; border-radius: 3px; transition: width 0.3s; }
.content { padding: 0 12px; }
.section-label { font-size: 10px; font-weight: 700; color: #888780; text-transform: uppercase; letter-spacing: 0.07em; margin: 14px 0 6px; }
.ex-card { background: white; border: 1px solid #e8e8e4; border-radius: 10px; padding: 11px 12px; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 10px; -webkit-tap-highlight-color: transparent; }
.ex-card.done { opacity: 0.45; }
.ex-card.done .check { background: #854F0B; border-color: #854F0B; }
.ex-card.done .check-icon { opacity: 1; }
.check { width: 22px; height: 22px; min-width: 22px; border-radius: 50%; border: 2px solid #D3D1C7; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; cursor: pointer; margin-top: 1px; }
.check-icon { opacity: 0; color: white; font-size: 13px; line-height: 1; }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 14px; font-weight: 600; color: #2C2C2A; }
.ex-detail { font-size: 12px; color: #888780; margin-top: 1px; }
.ex-tip { font-size: 11px; color: #854F0B; margin-top: 3px; font-style: italic; }
.how-btn { display: inline-block; margin-top: 5px; padding: 3px 9px; border-radius: 20px; border: 1px solid #2C2C2A; background: #f0ede8; color: #2C2C2A; font-size: 11px; font-weight: 500; cursor: pointer; }
.reset-btn { display: block; width: 100%; margin-top: 14px; padding: 11px; border-radius: 10px; border: 1px solid #D3D1C7; background: white; color: #888780; font-size: 13px; cursor: pointer; text-align: center; }
.confetti-wrap { text-align: center; padding: 1.5rem 1rem; display: none; }
.confetti-wrap.show { display: block; }
.confetti-wrap p { font-size: 15px; font-weight: 600; color: #2C2C2A; }
.confetti-wrap span { font-size: 36px; display: block; margin-bottom: 8px; }
.note-box { background: #FAEEDA; border-radius: 8px; padding: 10px 12px; margin: 10px 0 0; font-size: 12px; color: #633806; line-height: 1.5; }
.note-box strong { font-weight: 600; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: 20px 20px 0 0; padding: 1.25rem 1.25rem 2rem; width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: #D3D1C7; border-radius: 2px; margin: 0 auto 1rem; }
.modal-name { font-size: 17px; font-weight: 700; color: #2C2C2A; margin-bottom: 4px; }
.modal-detail { font-size: 12px; color: #888780; margin-bottom: 1rem; }
.modal-steps { list-style: none; padding: 0; }
.modal-steps li { display: flex; gap: 10px; margin-bottom: 10px; font-size: 14px; line-height: 1.5; color: #2C2C2A; }
.modal-steps li .num { background: #2C2C2A; color: white; border-radius: 50%; width: 22px; height: 22px; min-width: 22px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; margin-top: 1px; }
.modal-note { background: #FAEEDA; border-radius: 8px; padding: 10px 12px; margin-top: 12px; font-size: 12px; color: #633806; line-height: 1.5; }
.modal-note strong { font-weight: 600; }
.modal-close { display: block; width: 100%; margin-top: 14px; padding: 12px; border-radius: 10px; border: none; background: #2C2C2A; color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="phase-badge" id="phase-badge">Phase 1: Foundation</div>
    <h1>Justin's Training Program 💪</h1>
    <p id="header-sub">3 days/week · full gym · compound first</p>
  </div>
  <div class="tabs-wrap">
    <div class="week-tabs">
      <button class="week-tab active" onclick="setWeek(1)">Week 1–2</button>
      <button class="week-tab" onclick="setWeek(3)">Week 3–4</button>
      <button class="week-tab" onclick="setWeek(5)">Week 5–6</button>
      <button class="week-tab" onclick="setWeek(7)">Week 7–8</button>
    </div>
  </div>
  <div class="day-tabs">
    <button class="day-tab active" onclick="setDay(0)">Day 1<br><span style="font-size:10px;opacity:0.7">Front</span></button>
    <button class="day-tab" onclick="setDay(1)">Day 2<br><span style="font-size:10px;opacity:0.7">Rear</span></button>
    <button class="day-tab" onclick="setDay(2)">Day 3<br><span style="font-size:10px;opacity:0.7">Full</span></button>
    <button class="day-tab bonus" onclick="setDay(3)">Day 4<br><span style="font-size:10px;opacity:0.7">Circuit</span></button>
  </div>
  <div class="progress-wrap">
    <div class="progress-text" id="progress-text">0 of 0 done</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="content">
    <div id="exercise-list"></div>
    <div class="confetti-wrap" id="confetti">
      <span>💪</span>
      <p>Session done. Go eat something with protein.</p>
    </div>
    <button class="reset-btn" onclick="resetDay()">↺ Reset day</button>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-detail" id="modal-detail"></div>
    <ul class="modal-steps" id="modal-steps"></ul>
    <div class="modal-note" id="modal-note"></div>
    <button class="modal-close" onclick="closeModalDirect()">Got it</button>
  </div>
</div>

  "Barbell back squat": {
    steps: [
      "Bar sits across your upper traps — not your neck. Grip slightly wider than shoulder-width.",
      "Step back, feet shoulder-width apart, toes out 15-30 degrees.",
      "Take a big breath, brace your core hard like you're about to take a punch, then sit back and down.",

  },

    note: "Upper chest and anterior shoulder. Pairs well with flat bench."
  },
  "Dumbbell lateral raise": {
    steps: [
      "Stand with dumbbells at your sides, slight bend in elbows.",

      "Lead with your elbows, not your wrists. Think about pouring a glass of water.",
      "Lower slowly — don't let them drop. 3 seconds down."
    ],
    note: "Go light. This is a detail movement, not a strength one. Most people use way too much weight."
  },
  "Cable tricep pushdown": {
    steps: [
      "Stand at cable machine, rope or bar attachment at the top.",
      "Elbows pinned to your sides — they stay there the whole set.",
      "Push the attachment down until your arms are fully extended.",
      "Control back up. Elbows don't move, only your forearms."
    ],
    note: "Elbows glued to your ribs is the whole cue. If they're flaring, the weight is too heavy."
  },
  "Hanging knee raise": {
    steps: [
      "Hang from a pull-up bar with an overhand grip.",
      "Brace your core and pull your knees up toward your chest.",
      "Hold briefly at the top, then lower with control. Don't swing.",
      "Progress to straight leg raises when this gets easy."
    ],
    note: "If the bar's too high, use the captain's chair (arm pad station) — same movement, easier to control."
  },
  "Romanian deadlift": {
    steps: [
      "Stand with feet hip-width apart, barbell in hands just outside your hips.",
      "Push your hips back — not down. Hinge at the hips, keeping the bar close to your legs.",
      "Lower until you feel a strong stretch in your hamstrings. Back stays flat the whole time.",
      "Drive your hips forward to stand back up. Squeeze your glutes at the top."
    ],
    note: "The most important cue: hinge at the hips, don't squat. If your knees are bending a lot, you're squatting. Push your hips back like you're closing a car door with your backside."
  },
  "Conventional deadlift": {
    steps: [
      "Bar over your mid-foot. Feet hip-width apart. Grip just outside your legs.",
      "Hinge down to the bar — hips above your knees, chest up, back flat.",
      "Take a big breath and brace hard. Think: push the floor away, not pull the bar up.",
      "Bar stays close to your body the whole way — shins, thighs, hips. Stand tall at the top.",
      "Lower with control by hinging back at the hips."
    ],
    note: "Start with Romanian deadlifts to learn the hip hinge first. The conventional pull will feel much more natural once you have that pattern dialed."
  },
  "Leg curl (machine)": {
    steps: [
      "Lie face down on the machine, pad just above your heels.",
      "Curl your heels toward your backside as far as the machine allows.",
      "Hold 1 second at the top, then lower slowly — 3 seconds down.",
      "Don't let your hips lift off the pad. If they do, the weight is too heavy."
    ],
    note: "Isolates the hamstrings. Good complement to RDLs which hit them in the stretched position."
  },
  "Barbell hip thrust": {
    steps: [
      "Sit with your upper back against a bench. Roll the barbell over your hips — use a pad.",
      "Feet flat on the floor, hip-width apart, knees bent.",
      "Drive through your heels and thrust your hips up. Squeeze your glutes hard at the top.",
      "Body makes a straight line from knees to shoulders. Don't hyperextend your lower back.",
      "Lower slowly and repeat."
    ],
    note: "The best glute exercise in the gym. More range of motion than any squat variation. Load it progressively — this one responds well to weight."
  },
  "Pull-up / Lat pulldown": {
    steps: [
      "If doing pulldowns: sit with thighs under the pad, grip wider than shoulder-width.",
      "Pull the bar to your upper chest, leading with your elbows — think about putting them in your back pockets.",
      "Control back up to full arm extension.",
      "If doing pull-ups: same cue — lead with the elbows, chest to the bar."
    ],
    note: "Pulldowns and pull-ups train the same muscles. Use pulldowns to build toward pull-ups, or alternate."
  },
  "Barbell bent-over row": {
    steps: [
      "Hinge at the hips until your torso is roughly parallel to the floor. Knees slightly bent.",
      "Grip the bar just wider than shoulder-width. Back flat, core braced.",
      "Pull the bar to your lower chest/upper stomach. Lead with your elbows.",
      "Lower with control. Don't let your back round as you fatigue."
    ],
    note: "One of the best back exercises in the gym. The hip hinge position is the same as your deadlift setup — good reinforcement."
  },
  "Cable face pull": {
    steps: [
      "Set cable at head height or slightly above. Use a rope attachment.",
      "Grab with both hands, step back so there's tension. Stand tall.",
      "Pull the rope toward your face, separating your hands as you pull — elbows high and wide.",
      "Hold briefly at your ears, then extend slowly back out."
    ],
    note: "Underrated. Directly counteracts all the pressing you do and keeps your shoulders healthy long-term. Don't skip it."
  },
  "Dumbbell bicep curl": {
    steps: [
      "Stand with dumbbells at your sides, palms facing forward.",
      "Curl both up — or alternate — keeping your elbows pinned to your sides.",

    note: "Go lighter than you think. If your elbows are swinging forward, the weight is too heavy."
  },
  "Plank": {
    steps: [
      "Forearms on the floor, elbows under shoulders. Toes on the floor.",
      "Body in a straight line — don't let your hips sag or pike up.",
      "Squeeze everything: glutes, quads, core. Breathe normally.",
      "Build from 30 seconds toward 60. Quality over time."

    note: "Don't just hold it. Actively squeeze every muscle. A 30-second plank where you're truly braced beats a 90-second slack one."
  },
  "Cable woodchop": {
    steps: [

    note: "Trains rotational core strength — the kind you actually use in real life and in sport."
  },
  "Ab wheel rollout": {
    steps: [

  "Goblet squat": {
    steps: [

  },
  "Dumbbell row": {
    steps: [
      "Place one knee and one hand on a bench. Other foot flat on the floor.",

      "Pull the dumbbell up toward your hip — elbow close to your body.",

    note: "One of the best unilateral back exercises. Lets you load each side independently."

  "Dumbbell shoulder press": {
    steps: [

      "Lower slowly back to shoulder height.",

    note: "Seated keeps it strict. If you're using momentum to get the weight up, go lighter."
  },
  "Battle ropes": {
    steps: [
      "Stand with feet shoulder-width, slight bend in knees, hips back — athletic stance.",

    note: "Pure conditioning. 30-40 seconds all-out will humble you. Stay low in your stance."

  "Kettlebell swing": {
    steps: [

    note: "One of the best fat-burning exercises in the gym. It's a hip hinge, not a squat. Arms are just a rope connecting you to the bell."
  },
  "Box jump": {
    steps: [
      "Stand in front of a box, feet shoulder-width apart.",
      "Dip slightly and swing your arms, then explode up and land softly on the box with both feet.",
      "Land in a partial squat — knees bent, quiet landing.",
      "Step down (don't jump down). Reset and repeat."
    ],
    note: "Start with a low box. Landing mechanics matter more than height. Quiet landing = good mechanics."
  },
  "Dumbbell thruster": {
    steps: [
      "Hold dumbbells at shoulder height, palms facing in.",
      "Squat down to parallel, then as you drive up, press the dumbbells overhead in one fluid motion.",

    note: "Brutal. Hits basically everything. Go lighter than you think — these catch up to you fast in a circuit."

    steps: [
      "Pick up heavy dumbbells or kettlebells in each hand.",

      "Walk for the prescribed distance or time. Don't let the weights pull your shoulders forward.",

    note: "Deceptively simple and extremely effective. Builds grip strength, core stability, and conditioning simultaneously."

    steps: [
      "Stand with feet shoulder-width, hold a medicine ball overhead with both hands.",
      "Brace your core and slam the ball into the floor as hard as you can.",
      "Hinge at the hips as you slam — put your whole body into it.",

  "Cable row": {
    steps: [
      "Sit at the cable row machine, feet on the platform, slight bend in knees.",
      "Grab the handle, sit tall with a flat back.",
      "Pull toward your stomach, leading with your elbows. Squeeze your shoulder blades together at the end.",
      "Extend arms back slowly — feel the stretch in your back. Don't round forward."
    ],
    note: "Sit tall the whole time. Rounding forward at the start to get more range isn't more range — it's just bad posture."
  },

let currentWeek = 1, currentDay = 0;
let checked = {};
try { checked = JSON.parse(localStorage.getItem('justin_checked') || '{}'); } catch(e) {}
function save() { try { localStorage.setItem('justin_checked', JSON.stringify(checked)); } catch(e) {} }
function getKey() { return `w${currentWeek}d${currentDay}`; }

function setWeek(w) {
  currentWeek = w;
  document.querySelectorAll('.week-tab').forEach((t,i) => t.classList.toggle('active', [1,3,5,7][i]===w));
  renderDay();
}
function setDay(d) {
  currentDay = d;
  document.querySelectorAll('.day-tab').forEach((t,i) => t.classList.toggle('active', i===d));
  renderDay();
}
function toggle(key, idx) {
  checked[key+'_'+idx] = !checked[key+'_'+idx];
  save(); renderDay();
}
function resetDay() {
  const key = getKey();
  Object.keys(checked).forEach(k => { if(k.startsWith(key)) delete checked[k]; });
  save(); renderDay();
}
function openHow(name, detail) {
  const info = howTo[name];
  if (!info) return;
  document.getElementById('modal-name').textContent = name;
  document.getElementById('modal-detail').textContent = detail;
  document.getElementById('modal-steps').innerHTML = info.steps.map((s,i) =>
    `<li><span class="num">${i+1}</span><span>${s}</span></li>`).join('');
  const noteEl = document.getElementById('modal-note');
  if (info.note) { noteEl.style.display='block'; noteEl.innerHTML=`<strong>Note:</strong> ${info.note}`; }
  else noteEl.style.display='none';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) { if(e.target===document.getElementById('modal-overlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal-overlay').classList.remove('open'); }

function renderDay() {
  const week = data[currentWeek];
  const day = week.days[currentDay];
  document.getElementById('phase-badge').textContent = week.phase;
  document.getElementById('header-sub').textContent = week.sub;
  const key = getKey();
  const all = [...(day.warmup||[]),...(day.main||[]),...(day.accessory||[]),...(day.core||[])];
  const total = all.length;
  const done = all.filter((_,i) => checked[key+'_'+i]).length;
  document.getElementById('progress-text').textContent = `${done} of ${total} done`;
  document.getElementById('progress-fill').style.width = (total?Math.round(done/total*100):0)+'%';
  document.getElementById('confetti').classList.toggle('show', done===total&&total>0);

  let html = '', idx = 0;
  if(day.note) html += `<div class="note-box" style="margin-top:10px"><strong>Today:</strong> ${day.note}</div>`;

  function section(label, exs) {
    if(!exs||!exs.length) return;
    html += `<div class="section-label">${label}</div>`;
    exs.forEach(([name,detail,tip]) => {
      const i = idx++;
      const isDone = checked[key+'_'+i];
      const hasHow = !!howTo[name];
      html += `<div class="ex-card${isDone?' done':''}">
        <div class="check" onclick="toggle('${key}',${i})"><span class="check-icon">✓</span></div>
        <div class="ex-info">
          <div class="ex-name">${name}</div>
          <div class="ex-detail">${detail}</div>
          ${tip?`<div class="ex-tip">${tip}</div>`:''}
          ${hasHow?`<button class="how-btn" onclick="openHow('${name.replace(/'/g,"\\'")}','${detail.replace(/'/g,"\\'")}')">▶ how to</button>`:''}
        </div>
      </div>`;
    });
  }
  section('warmup', day.warmup);
  section('main lifts', day.main);
  section('accessories', day.accessory);
  section('core', day.core);
  document.getElementById('exercise-list').innerHTML = html;
}
renderDay();
