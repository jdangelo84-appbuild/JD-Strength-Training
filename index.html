<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Justin's Training Program</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #2C2C2A; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding: 0 0 2rem; }
.header { background: #2C2C2A; color: white; padding: 1.25rem 1rem 1rem; text-align: center; }
.header h1 { font-size: 20px; font-weight: 600; }
.header p { font-size: 12px; opacity: 0.7; margin-top: 3px; }
.phase-badge { display: inline-block; background: rgba(255,255,255,0.15); color: white; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px; }
.tabs-wrap { background: white; border-bottom: 1px solid #e0e0dc; padding: 10px 12px 0; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.week-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
.week-tabs::-webkit-scrollbar { display: none; }
.week-tab { flex-shrink: 0; padding: 5px 12px; border-radius: 20px; border: 1.5px solid #D3D1C7; background: white; color: #888780; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; }
.week-tab.active { background: #2C2C2A; color: white; border-color: #2C2C2A; }
.day-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px 12px; background: white; border-bottom: 1px solid #e0e0dc; }
.day-tab { padding: 7px 2px; border-radius: 8px; border: 1px solid #D3D1C7; background: white; color: #888780; font-size: 11px; font-weight: 500; cursor: pointer; text-align: center; line-height: 1.4; }
.day-tab.active { background: #f0ede8; color: #2C2C2A; border-color: #2C2C2A; font-weight: 600; }
.day-tab.bonus { border-style: dashed; }
.progress-wrap { padding: 10px 14px 0; }
.progress-text { font-size: 12px; color: #888780; margin-bottom: 5px; }
.progress-bar { height: 5px; background: #e0e0dc; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: #854F0B; border-radius: 3px; transition: width 0.3s; }
.rest-bar { background: #2C2C2A; padding: 10px 14px; display: none; align-items: center; gap: 10px; }
.rest-bar.visible { display: flex; }
.rest-label { color: white; font-size: 12px; font-weight: 500; white-space: nowrap; }
.rest-countdown { color: white; font-size: 20px; font-weight: 700; min-width: 36px; text-align: center; }
.rest-track { flex: 1; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }
.rest-fill { height: 100%; background: #EF9F27; border-radius: 2px; transition: width 1s linear; }
.rest-skip { color: rgba(255,255,255,0.6); font-size: 11px; cursor: pointer; white-space: nowrap; }
.content { padding: 0 12px; }
.section-label { font-size: 10px; font-weight: 700; color: #888780; text-transform: uppercase; letter-spacing: 0.07em; margin: 14px 0 6px; display: flex; align-items: center; justify-content: space-between; }
.section-rest { font-size: 10px; color: #854F0B; font-weight: 600; }
.ex-card { background: white; border: 1px solid #e8e8e4; border-radius: 10px; padding: 11px 12px; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 10px; }
.ex-card.done { opacity: 0.45; }
.ex-card.done .check { background: #854F0B; border-color: #854F0B; }
.ex-card.done .check-icon { opacity: 1; }
.check { width: 22px; height: 22px; min-width: 22px; border-radius: 50%; border: 2px solid #D3D1C7; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; cursor: pointer; margin-top: 1px; }
.check-icon { opacity: 0; color: white; font-size: 13px; line-height: 1; }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 14px; font-weight: 600; color: #2C2C2A; }
.ex-detail { font-size: 12px; color: #888780; margin-top: 1px; }
.ex-tip { font-size: 11px; color: #854F0B; margin-top: 3px; font-style: italic; }
.btn-row { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
.how-btn { padding: 3px 9px; border-radius: 20px; border: 1px solid #2C2C2A; background: #f0ede8; color: #2C2C2A; font-size: 11px; font-weight: 500; cursor: pointer; }
.rest-btn { padding: 3px 9px; border-radius: 20px; border: 1px solid #854F0B; background: #FAEEDA; color: #854F0B; font-size: 11px; font-weight: 500; cursor: pointer; }
.reset-btn { display: block; width: 100%; margin-top: 14px; padding: 11px; border-radius: 10px; border: 1px solid #D3D1C7; background: white; color: #888780; font-size: 13px; cursor: pointer; text-align: center; }
.confetti-wrap { text-align: center; padding: 1.5rem 1rem; display: none; }
.confetti-wrap.show { display: block; }
.confetti-wrap p { font-size: 15px; font-weight: 600; color: #2C2C2A; }
.confetti-wrap span { font-size: 36px; display: block; margin-bottom: 8px; }
.note-box { background: #FAEEDA; border-radius: 8px; padding: 10px 12px; margin: 10px 0 0; font-size: 12px; color: #633806; line-height: 1.5; }
.note-box strong { font-weight: 600; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: 20px 20px 0 0; padding: 1.25rem 1.25rem 2rem; width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: #D3D1C7; border-radius: 2px; margin: 0 auto 1rem; }
.modal-name { font-size: 17px; font-weight: 700; color: #2C2C2A; margin-bottom: 4px; }
.modal-detail { font-size: 12px; color: #888780; margin-bottom: 1rem; }
.modal-steps { list-style: none; padding: 0; }
.modal-steps li { display: flex; gap: 10px; margin-bottom: 10px; font-size: 14px; line-height: 1.5; color: #2C2C2A; }
.modal-steps li .num { background: #2C2C2A; color: white; border-radius: 50%; width: 22px; height: 22px; min-width: 22px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; margin-top: 1px; }
.modal-note { background: #FAEEDA; border-radius: 8px; padding: 10px 12px; margin-top: 12px; font-size: 12px; color: #633806; line-height: 1.5; }
.modal-note strong { font-weight: 600; }
.modal-close { display: block; width: 100%; margin-top: 14px; padding: 12px; border-radius: 10px; border: none; background: #2C2C2A; color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
</style>
</head>

  <div class="header">

  </div>
  <div class="tabs-wrap">
    <div class="week-tabs">
      <button class="week-tab active" onclick="setWeek(1)">Week 1-2</button>
      <button class="week-tab" onclick="setWeek(3)">Week 3-4</button>
      <button class="week-tab" onclick="setWeek(5)">Week 5-6</button>
      <button class="week-tab" onclick="setWeek(7)">Week 7-8</button>
    </div>
  </div>
  <div class="day-tabs">
    <button class="day-tab active" onclick="setDay(0)">Day 1<br><span style="font-size:10px;opacity:0.7">Front</span></button>
    <button class="day-tab" onclick="setDay(1)">Day 2<br><span style="font-size:10px;opacity:0.7">Rear</span></button>
    <button class="day-tab" onclick="setDay(2)">Day 3<br><span style="font-size:10px;opacity:0.7">Full</span></button>
    <button class="day-tab bonus" onclick="setDay(3)">Day 4<br><span style="font-size:10px;opacity:0.7">Circuit</span></button>

  <div class="progress-wrap">
    <div class="progress-text" id="progress-text">0 of 0 done</div>

  </div>
  <div class="rest-bar" id="rest-bar">
    <span class="rest-label">Rest</span>
    <span class="rest-countdown" id="rest-countdown">75</span>
    <div class="rest-track"><div class="rest-fill" id="rest-fill" style="width:100%"></div></div>
    <span class="rest-skip" onclick="skipRest()">skip x</span>
  </div>
  <div class="content">
    <div id="exercise-list"></div>
    <div class="confetti-wrap" id="confetti">

      <p>Session done. Go eat something with protein.</p>
    </div>

  </div>
</div>
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-detail" id="modal-detail"></div>
    <ul class="modal-steps" id="modal-steps"></ul>
    <div class="modal-note" id="modal-note"></div>
    <button class="modal-close" onclick="closeModal()">Got it</button>
  </div>
</div>
<script>

var restInterval = null;
var restRemaining = 0;
var restTotal = 0;

function startRest(seconds) {
  if (restInterval) clearInterval(restInterval);
  restRemaining = seconds;
  restTotal = seconds;
  document.getElementById('rest-bar').classList.add('visible');
  updateRestDisplay();
  restInterval = setInterval(function() {
    restRemaining--;
    updateRestDisplay();
    if (restRemaining <= 0) finishRest();
  }, 1000);
}

function updateRestDisplay() {
  document.getElementById('rest-countdown').textContent = restRemaining;
  var pct = (restRemaining / restTotal) * 100;
  document.getElementById('rest-fill').style.width = pct + '%';
  document.getElementById('rest-fill').style.background = restRemaining <= 10 ? '#E24B4A' : '#EF9F27';
}

function finishRest() {
  if (restInterval) clearInterval(restInterval);
  restInterval = null;
  document.getElementById('rest-bar').classList.remove('visible');
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.15, 0.3].forEach(function(t) {
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.3, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.12);
      o.start(ctx.currentTime + t);
      o.stop(ctx.currentTime + t + 0.15);
    });
  } catch(e) {}
}

function skipRest() {
  if (restInterval) clearInterval(restInterval);
  restInterval = null;
  document.getElementById('rest-bar').classList.remove('visible');
}

var currentWeek = 1;
var currentDay = 0;
var checked = {};
try { checked = JSON.parse(localStorage.getItem('justin_v3') || '{}'); } catch(e) {}

function save() {
  try { localStorage.setItem('justin_v3', JSON.stringify(checked)); } catch(e) {}
}

function getKey() { return 'w' + currentWeek + 'd' + currentDay; }

function setWeek(w) {
  currentWeek = w;
  document.querySelectorAll('.week-tab').forEach(function(t, i) {
    t.classList.toggle('active', [1,3,5,7][i] === w);
  });
  renderDay();
}

function setDay(d) {
  currentDay = d;
  document.querySelectorAll('.day-tab').forEach(function(t, i) {
    t.classList.toggle('active', i === d);
  });
  renderDay();
}

function toggle(key, idx, sType) {
  var wasChecked = checked[key + '_' + idx];
  checked[key + '_' + idx] = !wasChecked;
  save();
  var week = data[currentWeek];
  if (!wasChecked && sType !== 'warmup') {
    var secs;
    if (sType === 'circuit') { secs = 90; }
    else if (sType === 'main') { secs = week.restMain; }
    else if (sType === 'accessory') { secs = week.restAcc; }
    else if (sType === 'core') { secs = week.restCore; }
    else { secs = 60; }
    startRest(secs);
  } else {
    skipRest();
  }
  renderDay();
}

function resetDay() {
  var key = getKey();
  Object.keys(checked).forEach(function(k) {
    if (k.indexOf(key) === 0) delete checked[k];
  });
  skipRest();
  save();
  renderDay();
}

function openHow(name, detail) {
  var info = howTo[name];
  if (!info) return;
  document.getElementById('modal-name').textContent = name;
  document.getElementById('modal-detail').textContent = detail;
  document.getElementById('modal-steps').innerHTML = info.steps.map(function(s, i) {
    return '<li><span class="num">' + (i+1) + '</span><span>' + s + '</span></li>';
  }).join('');
  var noteEl = document.getElementById('modal-note');
  if (info.note) {
    noteEl.style.display = 'block';
    noteEl.innerHTML = '<strong>Note:</strong> ' + info.note;
  } else {
    noteEl.style.display = 'none';
  }
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function renderDay() {
  var week = data[currentWeek];
  var day = week.days[currentDay];
  document.getElementById('phase-badge').textContent = week.phase;
  document.getElementById('header-sub').textContent = week.sub;

  var key = getKey();
  var all = (day.warmup || []).concat(day.main || []).concat(day.accessory || []).concat(day.core || []);
  var total = all.length;
  var done = all.filter(function(_, i) { return checked[key + '_' + i]; }).length;
  document.getElementById('progress-text').textContent = done + ' of ' + total + ' done';
  document.getElementById('progress-fill').style.width = (total ? Math.round(done/total*100) : 0) + '%';
  document.getElementById('confetti').classList.toggle('show', done === total && total > 0);

  var html = '';
  var idx = 0;
  var isCircuit = currentDay === 3;

  if (day.note) {
    html += '<div class="note-box"><strong>Today:</strong> ' + day.note + '</div>';
  }

  function section(label, exs, sType) {
    if (!exs || !exs.length) return;
    var restSec;
    if (sType === 'warmup') { restSec = 0; }
    else if (isCircuit) { restSec = 90; }
    else if (sType === 'main') { restSec = week.restMain; }
    else if (sType === 'accessory') { restSec = week.restAcc; }
    else if (sType === 'core') { restSec = week.restCore; }
    else { restSec = 60; }

    var restLabel = (sType !== 'warmup' && restSec > 0) ? (' · ' + restSec + 's rest') : '';
    html += '<div class="section-label">' + label + '<span class="section-rest">' + restLabel + '</span></div>';

    exs.forEach(function(ex) {
      var i = idx++;
      var isDone = checked[key + '_' + i];
      var name = ex[0];
      var detail = ex[1];
      var tip = ex[2];
      var hasHow = !!howTo[name];
      var safeName = name.replace(/'/g, "\\'");
      var safeDetail = detail.replace(/'/g, "\\'");
      var actualType = isCircuit && sType !== 'core' ? 'circuit' : sType;

      html += '<div class="ex-card' + (isDone ? ' done' : '') + '">';
      html += '<div class="check" onclick="toggle(\'' + key + '\',' + i + ',\'' + actualType + '\')"><span class="check-icon">&#10003;</span></div>';
      html += '<div class="ex-info">';
      html += '<div class="ex-name">' + name + '</div>';
      html += '<div class="ex-detail">' + detail + '</div>';
      if (tip) html += '<div class="ex-tip">' + tip + '</div>';
      html += '<div class="btn-row">';
      if (hasHow) html += '<button class="how-btn" onclick="openHow(\'' + safeName + '\',\'' + safeDetail + '\')">&#9654; how to</button>';
      if (sType !== 'warmup' && restSec > 0) {
        html += '<button class="rest-btn" onclick="startRest(' + restSec + ')">&#9201; ' + restSec + 's</button>';
      }
      html += '</div></div></div>';
    });
  }

  section('warmup', day.warmup, 'warmup');
  section('main lifts', day.main, 'main');
  section('accessories', day.accessory, 'accessory');
  section('core', day.core, 'core');

  document.getElementById('exercise-list').innerHTML = html;
}

renderDay();
